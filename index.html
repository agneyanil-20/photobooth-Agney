<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNTRL M — Digital Photobooth</title>
  <meta name="description"
    content="Create aesthetic photobooth memories in seconds. Capture 4 photos, apply filters, download your strip." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Special+Elite&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="brand">
      <span class="brand-title">CNTRL M</span>
      <span class="brand-sub">DIGITAL PHOTOBOOTH</span>
    </div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <!-- Theme Toggle -->
      <div class="theme-toggle" id="themeToggle">
        <div class="theme-thumb"></div>
        <button id="btnDark" class="theme-btn" aria-label="Dark Mode">🌙</button>
        <button id="btnLight" class="theme-btn" aria-label="Light Mode">☀️</button>
      </div>

      <button class="gallery-btn" id="openGalleryBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:middle">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        Gallery (<span id="galleryCount">0</span>)
      </button>
    </div>
  </header>

  <!-- LANDING PAGE / HERO (DOODLES BACKGROUND) -->
  <section class="landing" id="landingPage" style="background: url('bg.png') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative;">
    
    <!-- Dark overlay to ensure button contrasts well against the doodles -->
    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.15); z-index: 1;"></div>
    
    <div style="position: relative; z-index: 2;">
      <!-- Huge CTA button overlaid on the image -->
      <button class="enter-btn animate-fade-up" id="enterBtn" style="--delay:0ms; padding: 20px 48px; border-radius: 40px; font-size: 1.5rem; letter-spacing: 0.1em; box-shadow: 0 16px 40px rgba(0,0,0,0.4); border: 2px solid var(--black); background: var(--accent); color: #000;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:12px;vertical-align:middle">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
        </svg>
        ENTER
      </button>
    </div>

    <!-- Hidden elements to preserve app.js state logic -->
    <div id="onlineStatus" style="display:none;"></div>
    <div id="onlineText" style="display:none;"></div>
  </section>

  <!-- PHOTOBOOTH PAGE -->
  <section class="booth" id="boothPage" style="display:none;">
    <div class="booth-layout">

      <!-- LEFT: Camera + controls -->
      <div class="booth-left">
        <div class="camera-wrap" id="cameraWrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlayCanvas" class="overlay-canvas"></canvas>

          <!-- Frame preview overlay -->
          <div class="frame-preview-overlay" id="framePreviewOverlay" data-frame="none"></div>

          <!-- Countdown overlay -->
          <div class="countdown-overlay" id="countdownOverlay" style="display:none;">
            <div class="countdown-ring" id="countdownRing"></div>
            <span id="countdownNum"></span>
          </div>

          <!-- Flash overlay -->
          <div class="flash-overlay" id="flashOverlay"></div>

          <!-- Camera phase label (shot x of 4) -->
          <div class="shot-label" id="shotLabel" style="display:none;"></div>

          <!-- Camera toolbar -->
          <div class="cam-toolbar">
            <button class="cam-tool-btn active" id="btnMirror" title="Mirror">⇄</button>
            <button class="cam-tool-btn" id="btnAspect" title="Aspect ratio">▣</button>
            <button class="cam-tool-btn" id="btnRotate" title="Rotate">↺</button>
            <button class="cam-tool-btn" id="btnFlip" title="Flip Camera">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 7h-9" />
                <path d="M14 17H5" />
                <circle cx="17" cy="17" r="3" />
                <circle cx="7" cy="7" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Filter pills row -->
        <div class="filter-pills-row" id="filterPillsRow">
          <button class="filter-pill-btn active" data-filter="original">Original</button>
          <button class="filter-pill-btn" data-filter="noir">B&amp;W</button>
          <button class="filter-pill-btn" data-filter="vintage">Vintage</button>
          <button class="filter-pill-btn" data-filter="warm">Warm</button>
          <button class="filter-pill-btn" data-filter="cool">Cool</button>
          <button class="filter-pill-btn" data-filter="vivid">Vivid</button>
          <button class="filter-pill-btn" data-filter="dreamy">Dreamy</button>
          <button class="filter-pill-btn" data-filter="high-contrast">Hi-Con</button>
          <button class="filter-pill-btn" data-filter="psychedelic">Psychedelic</button>
          <button class="filter-pill-btn" data-filter="deep-shadow">Shadow</button>
        </div>

        <!-- Progress indicators (4 frames) -->
        <div class="strip-progress" id="stripProgress" style="display:none;">
          <div class="sp-slot" id="sp0"><span class="sp-num">1</span></div>
          <div class="sp-slot" id="sp1"><span class="sp-num">2</span></div>
          <div class="sp-slot" id="sp2"><span class="sp-num">3</span></div>
          <div class="sp-slot" id="sp3"><span class="sp-num">4</span></div>
        </div>

        <!-- Shutter + actions -->
        <div class="controls-row">
          <div class="shutter-wrap">
            <button class="mosquito-btn" id="takeStripBtn" title="Take Strip">
              <div class="mosquito" id="mosquitoIcon">
                <svg viewBox="0 0 100 100" width="60" height="60">
                  <ellipse cx="50" cy="50" rx="8" ry="22" fill="#111" />
                  <ellipse cx="28" cy="40" rx="25" ry="10" fill="rgba(0,0,0,0.1)" stroke="#111" stroke-width="2"
                    transform="rotate(-20 28 40)" />
                  <ellipse cx="72" cy="40" rx="25" ry="10" fill="rgba(0,0,0,0.1)" stroke="#111" stroke-width="2"
                    transform="rotate(20 72 40)" />
                  <circle cx="50" cy="20" r="7" fill="#111" />
                  <circle cx="46" cy="18" r="2.5" fill="#ff3333" />
                  <circle cx="54" cy="18" r="2.5" fill="#ff3333" />
                  <path d="M 50 13 L 50 2" stroke="#111" stroke-width="2" />
                  <path d="M 45 40 L 25 30 M 45 50 L 25 50 M 45 60 L 25 70" stroke="#111" stroke-width="2" fill="none" />
                  <path d="M 55 40 L 75 30 M 55 50 L 75 50 M 55 60 L 75 70" stroke="#111" stroke-width="2" fill="none" />
                </svg>
              </div>
              <div class="blood-splatter" id="bloodSplatter">
                <svg viewBox="0 0 100 100" width="80" height="80">
                  <path
                    d="M50 20 Q60 5 70 20 Q90 20 80 40 Q95 60 75 70 Q80 90 60 80 Q50 95 40 80 Q20 90 25 70 Q5 60 20 40 Q10 20 30 20 Q40 5 50 20 Z"
                    fill="#cc0000" opacity="0.85" />
                  <circle cx="15" cy="15" r="4" fill="#cc0000" />
                  <circle cx="85" cy="85" r="5" fill="#cc0000" />
                  <circle cx="85" cy="20" r="3" fill="#cc0000" />
                  <circle cx="10" cy="70" r="4" fill="#cc0000" />
                </svg>
              </div>
            </button>
            <span class="shutter-label">TAKE STRIP</span>
          </div>
        </div>

        <!-- Action buttons (download + copy) shown after strip captured -->
        <div class="action-btns-wrap" id="actionBtnsWrap" style="display:none;">
          <button class="action-btn primary" id="downloadStripBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download Strip
          </button>
          <button class="action-btn" id="copyStripBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy
          </button>
        </div>

        <!-- Instructions -->
        <div class="instructions">
          <div class="instr-step">
            <span class="instr-num">1</span>
            <p>Pick a filter above the camera preview</p>
          </div>
          <div class="instr-step">
            <span class="instr-num">2</span>
            <p>Choose a frame style from the right panel</p>
          </div>
          <div class="instr-step">
            <span class="instr-num">3</span>
            <p>Hit the button & smile — 4 shots taken automatically</p>
          </div>
        </div>

        <button class="exit-btn" id="exitBtn">✕ Exit Booth</button>
      </div>

      <!-- RIGHT: Frame + Filter picker -->
      <div class="booth-right">
        <div class="section-label">⊞ SELECT FRAME</div>
        <div class="frame-list" id="frameList">
          <button class="frame-item active" data-frame="none">No Frame</button>
          <button class="frame-item" data-frame="minimal">Minimal</button>
          <button class="frame-item" data-frame="polaroid">Polaroid</button>
          <button class="frame-item" data-frame="neon">Neon</button>
          <button class="frame-item" data-frame="classic">Classic</button>
          <button class="frame-item" data-frame="brutal">Brutal</button>
          <button class="frame-item featured" data-frame="cntrlm">Cntrl M ✦</button>
        </div>

        <!-- Mini strip preview -->
        <div class="section-label" style="margin-top:16px;">⬜ STRIP PREVIEW</div>
        <div class="mini-strip-wrap">
          <div class="mini-strip" id="miniStrip">
            <div class="mini-frame" id="mf0"></div>
            <div class="mini-frame" id="mf1"></div>
            <div class="mini-frame" id="mf2"></div>
            <div class="mini-frame" id="mf3"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- GALLERY MODAL -->
  <div class="modal-backdrop" id="galleryModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Gallery</h2>
        <button class="modal-close" id="closeGallery">✕</button>
      </div>
      <div class="gallery-grid" id="galleryGrid">
        <div class="gallery-empty" id="galleryEmpty">No photos yet. Take your first strip!</div>
      </div>
    </div>
  </div>

  <!-- HIDDEN CANVAS FOR CAPTURE -->
  <canvas id="captureCanvas" style="display:none;"></canvas>

  <!-- FULL VIEW MODAL -->
  <div class="modal-backdrop" id="fullViewModal" style="display:none; z-index:300;">
    <div class="full-view-container">
      <div class="full-view-toolbar">
        <button class="gallery-action-btn primary" id="fullViewDownloadBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download Strip
        </button>
        <button class="modal-close" id="closeFullView">✕</button>
      </div>
      <div class="full-view-content">
        <img src="" id="fullViewImg" alt="Full Strip View" />
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>

</html>
